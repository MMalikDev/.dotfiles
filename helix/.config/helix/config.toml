theme = "catppuccin_mocha"

[editor]
rulers = [74, 80, 100, 120, 160]
line-number = "relative"
bufferline = "multiple"
mouse = true
cursorline = true
true-color = true
color-modes = true
auto-pairs = true
idle-timeout = 250
completion-timeout = 5
completion-trigger-len = 1
jump-label-alphabet = "asdfzxcqwervtgbyhnujmikolp"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.search]
wrap-around = true

[editor.gutters.line-numbers]
min-width = 2

[editor.indent-guides]
render = true
character = "|"
skip-levels = 1

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
tab = ":buffer-next"
S-tab = ":buffer-previous"
"\\" = "file_explorer_in_current_directory"
C-s = ":w"
C-S-s = ":w"

[keys.normal.space]
C-c = ":open ~/.config/helix/config.toml" 
space = "buffer_picker"
"=" = ":format"

[keys.normal.space.b]
d = ":buffer-close"
w  = ":write-buffer-close"
o = ":buffer-close-others"
O = ":buffer-close-others!"

[keys.normal.space.q]
q = ":q"
w = ":wq"
s = ":w"
e = ":q!"
